<!DOCTYPE html>
<html>
<head>
  <title>ThumbForge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      padding: 40px;
      border-radius: 20px;
      width: 400px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    h1 {
      color: white;
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 30px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      background: #dc2626;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #b91c1c;
      transform: translateY(-2px);
    }

    .loader {
      display: none;
      margin-top: 15px;
      border: 4px solid #1e293b;
      border-top: 4px solid #dc2626;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin-left: auto;
      margin-right: auto;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<div class="card">
  <h1>ThumbForge</h1>
  <p>Download Every Thumbnail From Any Playlist</p>

  <input type="text" id="playlist" placeholder="Paste Playlist URL">
  <button onclick="download()">Download</button>

  <div class="loader" id="loader"></div>
</div>

<script>
async function download() {
  const url = document.getElementById("playlist").value;
  const loader = document.getElementById("loader");

  if (!url) {
    alert("Please paste playlist URL");
    return;
  }

  loader.style.display = "block";

  try {
    const response = await fetch("https://thumb-backend-production.up.railway.app/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ playlistUrl: url })
    });

    if (!response.ok) {
      throw new Error("Failed");
    }

    const blob = await response.blob();
    const link = document.createElement("a");
    link.href = window.URL.createObjectURL(blob);
    link.download = "thumbnails.zip";
    link.click();

  } catch (err) {
    alert("Something went wrong");
  }

  loader.style.display = "none";
}
</script>

</body>
</html>
